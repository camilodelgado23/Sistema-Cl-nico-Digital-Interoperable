version: "3.9"

# ── Networks ──────────────────────────────────────────────────────────────────
networks:
  clinical_net:
    driver: bridge

# ── Volumes ───────────────────────────────────────────────────────────────────
volumes:
  minio_data:
  mlflow_data:

services:

  # ── PROXY ──────────────────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - backend
      - frontend
    networks:
      - clinical_net
    restart: unless-stopped

  # ── FRONTEND ───────────────────────────────────────────────────────────────
  frontend:
    image: node:18
    working_dir: /app
    volumes:
      - ./frontend:/app
    ports:
      - "3000:3000"
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 3000"
    networks:
      - clinical_net
    restart: unless-stopped

  # ── BACKEND ────────────────────────────────────────────────────────────────
  backend:
    build: ./backend
    expose:
      - "8000"
    ports:
      - "8000:8000"
    env_file: ./backend/.env
    networks:
      - clinical_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── FHIR SERVER ────────────────────────────────────────────────────────────
  fhir-server:
    image: hapiproject/hapi:latest
    expose:
      - "8080"
    environment:
      - hapi.fhir.default_encoding=JSON
      - hapi.fhir.fhir_version=R4
    networks:
      - clinical_net
    restart: unless-stopped

  # ── ML SERVICE ─────────────────────────────────────────────────────────────
  ml-service:
    build: ./ml-service
    expose:
      - "8001"
    ports:
      - "8001:8001"
    env_file: ./ml-service/.env
    networks:
      - clinical_net
    restart: unless-stopped

  # ── DL SERVICE ─────────────────────────────────────────────────────────────
  dl-service:
    build: ./dl-service
    expose:
      - "8002"
    ports:
      - "8002:8002"
    env_file: ./dl-service/.env
    networks:
      - clinical_net
    restart: unless-stopped

  # ── ORCHESTRATOR ───────────────────────────────────────────────────────────
  orchestrator:
    build: ./orchestrator
    expose:
      - "8003"
    ports:
      - "8003:8003"
    env_file: ./orchestrator/.env
    depends_on:
      - ml-service
      - dl-service
    networks:
      - clinical_net
    restart: unless-stopped

  # ── MINIO ──────────────────────────────────────────────────────────────────
  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
      MINIO_API_CORS_ALLOW_ORIGIN: "*"
      MINIO_API_CORS_ALLOW_METHODS: "GET,PUT,POST,DELETE,HEAD"
      MINIO_SERVER_URL: "http://localhost:9000"        # ✅ AGREGAR ESTA
      MINIO_BROWSER_REDIRECT_URL: "http://localhost:9001"  # ✅ Y ESTA
    volumes:
      - minio_data:/data
    networks:
      - clinical_net
    restart: unless-stopped

  # ── MINIO INIT ─────────────────────────────────────────────────────────────
  minio-init:
    image: minio/mc
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      sleep 5;
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb --ignore-existing local/clinical-images;
      echo 'Bucket clinical-images listo (PRIVADO — acceso via presigned URLs)';
      "
    networks:
      - clinical_net

  # ── MLFLOW ─────────────────────────────────────────────────────────────────
  mlflow:
    image: ghcr.io/mlflow/mlflow
    command: mlflow server --host 0.0.0.0 --port 5000
    expose:
      - "5000"
    volumes:
      - mlflow_data:/mlflow
    networks:
      - clinical_net
    restart: unless-stopped

  # ── MAILHOG ────────────────────────────────────────────────────────────────
  mailhog:
    image: mailhog/mailhog
    expose:
      - "1025"
      - "8025"
    networks:
      - clinical_net
    restart: unless-stopped