worker_processes auto;

events {
    worker_connections 1024;
}

http {
    # ── Rate-limit zones ─────────────────────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=auth_zone:10m    rate=100r/m;
    limit_req_zone $binary_remote_addr zone=api_zone:10m     rate=500r/m;
    limit_req_zone $binary_remote_addr zone=infer_zone:10m   rate=10r/m;

    # ── Auto-ban after 10 failed auth attempts in 5 min ─────────────────────
    limit_req_status 429;

    # ── Upstream services ────────────────────────────────────────────────────
    upstream backend    { server backend:8000; }
    upstream frontend   { server frontend:3000; }
    upstream fhir       { server fhir-server:8080; }

    # ── HTTP → redirect to HTTPS ─────────────────────────────────────────────
    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    # ── HTTPS server ─────────────────────────────────────────────────────────
    server {
        listen 443 ssl;
        server_name _;

        # Self-signed certs (dev). Replace with Let's Encrypt in production.
        ssl_certificate     /etc/nginx/certs/cert.pem;
        ssl_certificate_key /etc/nginx/certs/key.pem;

        # Anti-Slowloris
        client_body_timeout    10s;
        send_timeout           10s;
        keepalive_timeout      30s;

        # Max payload for medical images
        client_max_body_size   10M;

        # ── Security headers ─────────────────────────────────────────────────
        add_header X-Frame-Options            "DENY"                  always;
        add_header X-Content-Type-Options     "nosniff"               always;
        add_header Strict-Transport-Security  "max-age=31536000"      always;
        add_header Content-Security-Policy    "default-src 'self' 'unsafe-inline' data:" always;
        add_header Referrer-Policy            "strict-origin-when-cross-origin" always;

        # ── Auth endpoints — 100 req/min ─────────────────────────────────────
        location /auth/ {
            limit_req zone=auth_zone burst=20 nodelay;
            proxy_pass         http://backend;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # ── Inference endpoints — 10 req/min ─────────────────────────────────
        location /infer {
            limit_req zone=infer_zone burst=5 nodelay;
            proxy_pass         http://backend;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
        }

        # ── Backend API ───────────────────────────────────────────────────────
        location /fhir/ {
            limit_req zone=api_zone burst=50 nodelay;
            proxy_pass         http://backend;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
        }

        location /admin/ {
            limit_req zone=api_zone burst=50 nodelay;
            proxy_pass         http://backend;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
        }

        # ── Frontend SPA ──────────────────────────────────────────────────────
        location / {
            proxy_pass         http://frontend;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
        }
    }
}